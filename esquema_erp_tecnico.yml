openapi: 3.0.3
info:
  title: ERP Colombiano API
  version: 1.0.0
  description: Documentación interactiva de los servicios del ERP. Incluye gestión
    de usuarios y autenticación JWT.
paths:
  /api/users/:
    get:
      operationId: users_list
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      tags:
      - users
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
    post:
      operationId: users_create
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/users/{id}/:
    get:
      operationId: users_retrieve
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: users_update
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: users_partial_update
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: users_destroy
      description: |-
        ModelViewSet concentra en una sola clase las 5 acciones del CRUD:
        - Listar (GET /)
        - Crear (POST /)
        - Ver detalle (GET /id/)
        - Editar (PUT-PATCH /id/)
        - Borrar (DELETE /id/)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - jwtAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/users/token/:
    post:
      operationId: users_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/users/token/refresh/:
    post:
      operationId: users_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    PatchedUserRequest:
      type: object
      description: |-
        Heredar de ModelSerializer otorga automáticamente las funciones de:
        LECTURA (List/Retrieve), EDICIÓN (Update/Patch) y ELIMINACIÓN (Delete).
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        cedula:
          type: string
          minLength: 1
          title: Cédula o NIT
          maxLength: 20
        telefono:
          type: string
          nullable: true
          maxLength: 15
        cargo:
          type: string
          nullable: true
          maxLength: 50
        empresa:
          type: string
          nullable: true
          maxLength: 100
    TokenObtainPair:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    TokenObtainPairRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    User:
      type: object
      description: |-
        Heredar de ModelSerializer otorga automáticamente las funciones de:
        LECTURA (List/Retrieve), EDICIÓN (Update/Patch) y ELIMINACIÓN (Delete).
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        cedula:
          type: string
          title: Cédula o NIT
          maxLength: 20
        telefono:
          type: string
          nullable: true
          maxLength: 15
        cargo:
          type: string
          nullable: true
          maxLength: 50
        empresa:
          type: string
          nullable: true
          maxLength: 100
      required:
      - cedula
      - email
      - id
      - username
    UserRequest:
      type: object
      description: |-
        Heredar de ModelSerializer otorga automáticamente las funciones de:
        LECTURA (List/Retrieve), EDICIÓN (Update/Patch) y ELIMINACIÓN (Delete).
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        cedula:
          type: string
          minLength: 1
          title: Cédula o NIT
          maxLength: 20
        telefono:
          type: string
          nullable: true
          maxLength: 15
        cargo:
          type: string
          nullable: true
          maxLength: 50
        empresa:
          type: string
          nullable: true
          maxLength: 100
      required:
      - cedula
      - email
      - password
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
